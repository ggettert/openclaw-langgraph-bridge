name: Feature request
description: Suggest an enhancement or new capability
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Please describe the problem before the solution — it helps us evaluate alternatives.
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do that the bridge does not support today? What is the pain?
      placeholder: I want to ... but currently the bridge ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? Sketch the API, config, or behaviour if you can.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you have weighed, and why they fall short.
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission checks
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
