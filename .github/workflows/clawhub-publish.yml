name: Publish to ClawHub

# Fires when a GitHub Release is published (release.yml creates it on a v* tag
# push), and can also be dispatched manually against an existing tag from the
# Actions tab. NOTE: a Release created by the default GITHUB_TOKEN does NOT emit
# a release:published event that retriggers this workflow — the Release must be
# published by a real identity (a user, or a PAT-authenticated action) for the
# subscription below to fire. See GitHub's workflow-triggering restriction:
# https://docs.github.com/en/actions/using-workflows/triggering-a-workflow#triggering-a-workflow-from-a-workflow
# Requires the CLAWHUB_TOKEN secret.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing git tag to publish (e.g. v1.0.0)
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: clawhub-publish-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to ClawHub
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.actor == 'ggettert'
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.tag_name || github.ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve publish mode and verify version
        id: release
        shell: bash
        env:
          TARGET_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.tag_name || github.ref_name }}
        run: |
          set -euo pipefail
          TAG="${TARGET_TAG}"
          RAW_VERSION="${TAG#v}"
          CLAWHUB_TAG="latest"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"

          if [[ "$RAW_VERSION" != "$PACKAGE_VERSION" ]]; then
            echo "::error::Tag/version mismatch: tag=$TAG package.json=$PACKAGE_VERSION"
            exit 1
          fi

          if [[ "$RAW_VERSION" =~ -(alpha|beta|rc)(\.|$) ]]; then
            CLAWHUB_TAG="beta"
          fi

          echo "clawhub_tag=${CLAWHUB_TAG}" >> "$GITHUB_OUTPUT"

      - name: Install ClawHub CLI
        # Pinned for reproducible releases. Bump intentionally when validating a new
        # ClawHub CLI release; do not use @latest in CI.
        run: npm install --global clawhub@0.23.0

      - name: Type-check & build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Authenticate ClawHub CLI
        env:
          CLAWHUB_CONFIG_PATH: ${{ runner.temp }}/clawhub-config.json
          CLAWHUB_SITE: https://clawhub.ai
          CLAWHUB_REGISTRY: https://clawhub.ai
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${CLAWHUB_TOKEN:-}" ]]; then
            echo "::error::CLAWHUB_TOKEN secret is required for ClawHub publish."
            exit 1
          fi
          clawhub auth login --token "${CLAWHUB_TOKEN}" --no-browser

      - name: Publish package to ClawHub
        env:
          CLAWHUB_CONFIG_PATH: ${{ runner.temp }}/clawhub-config.json
          CLAWHUB_SITE: https://clawhub.ai
          CLAWHUB_REGISTRY: https://clawhub.ai
          CLAWHUB_TAGS: ${{ steps.release.outputs.clawhub_tag }}
          SOURCE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          ACTUAL_SHA="$(git rev-parse HEAD)"
          clawhub package publish . \
            --tags "${CLAWHUB_TAGS}" \
            --source-repo "${GITHUB_REPOSITORY}" \
            --source-commit "${ACTUAL_SHA}" \
            --source-ref "${SOURCE_REF}" \
            --source-path "."
