name: Publish to npm

# Fires when a GitHub Release is published (release.yml creates it on a v* tag
# push), and can also be dispatched manually against an existing tag from the
# Actions tab. NOTE: a Release created by the default GITHUB_TOKEN does NOT emit
# a release:published event that retriggers this workflow — the Release must be
# published by a real identity (a user, or a PAT-authenticated action) for the
# subscription below to fire. See GitHub's workflow-triggering restriction:
# https://docs.github.com/en/actions/using-workflows/triggering-a-workflow#triggering-a-workflow-from-a-workflow
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing git tag to publish (e.g. v0.14.1)
        required: true
        type: string

permissions:
  id-token: write
  contents: read

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build & publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.actor == 'ggettert'
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.tag_name || github.ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Resolve publish mode and verify version
        id: release
        shell: bash
        env:
          TARGET_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.tag_name || github.ref_name }}
        run: |
          set -euo pipefail
          TAG="${TARGET_TAG}"
          RAW_VERSION="${TAG#v}"
          NPM_TAG="latest"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"

          if [[ "$RAW_VERSION" != "$PACKAGE_VERSION" ]]; then
            echo "::error::Tag/version mismatch: tag=$TAG package.json=$PACKAGE_VERSION"
            exit 1
          fi

          if [[ "$RAW_VERSION" =~ -(alpha|beta|rc)(\.|$) ]]; then
            NPM_TAG="next"
          fi

          echo "npm_tag=${NPM_TAG}" >> "$GITHUB_OUTPUT"

      - name: Type-check & build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Smoke-test runtime install
        run: |
          # Reinstall with runtime + peer deps. The plugin imports openclaw/plugin-sdk/core
          # at runtime, so --omit=peer would cause the smoke test to fail with
          # "Cannot find module 'openclaw/plugin-sdk/core'". Dev and optional are still
          # safe to omit because they aren't imported from dist/.
          rm -rf node_modules
          npm ci --omit=dev --omit=optional
          # Plugin is ESM (tsconfig module=NodeNext + package.json type=module).
          # Use dynamic import() rather than require() to load it cleanly.
          node --input-type=module -e "await import('./dist/index.js'); console.log('OK: runtime entrypoint loads')"

      - name: Publish to npm
        run: |
          # Trusted publishing via OIDC — no token. Remove any stale token context.
          unset NODE_AUTH_TOKEN
          unset NPM_TOKEN

          if [[ "${{ steps.release.outputs.npm_tag }}" == "next" ]]; then
            npm publish --access public --tag next --provenance
          else
            npm publish --access public --provenance
          fi
