name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  detect-changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      code: ${{ steps.filter.outputs.code }}
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          # Classify diffs. 'code' covers anything that affects build/test.
          # Anything not matching 'code' is treated as docs-only and short-
          # circuits build/test/integration to success.
          filters: |
            code:
              - 'src/**'
              - 'examples/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - 'vitest.config.ts'
              - 'vitest.integration.config.ts'
              - 'openclaw.plugin.json'
              - '.github/workflows/**'
              - '.eslintrc*'
              - '.prettierrc*'
              - '.prettierignore'

  build-and-test:
    name: Build & Test (Node ${{ matrix.node-version }} on ${{ matrix.os }})
    needs: detect-changes
    strategy:
      fail-fast: false
      matrix:
        node-version: ["22.x", "24.x"]
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    steps:
      - name: Skipped (no code changes)
        if: needs.detect-changes.outputs.code != 'true'
        run: echo "No code changes; build/test skipped. This is a docs-only PR."

      - uses: actions/checkout@v7
        if: needs.detect-changes.outputs.code == 'true'

      - uses: actions/setup-node@v7
        if: needs.detect-changes.outputs.code == 'true'
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        if: needs.detect-changes.outputs.code == 'true'
        run: npm ci

      - name: Verify version sync (package.json vs openclaw.plugin.json)
        if: needs.detect-changes.outputs.code == 'true'
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          MANIFEST_VERSION="$(node -p "require('./openclaw.plugin.json').version")"
          if [[ "$PKG_VERSION" != "$MANIFEST_VERSION" ]]; then
            echo "::error::Version drift: package.json=$PKG_VERSION openclaw.plugin.json=$MANIFEST_VERSION"
            exit 1
          fi
          echo "Versions synced: $PKG_VERSION"

      - name: Type-check & build
        if: needs.detect-changes.outputs.code == 'true'
        run: npm run build

      - name: Run tests
        if: needs.detect-changes.outputs.code == 'true'
        run: npm test

  integration:
    name: Integration Tests (LangGraph dev)
    needs: [detect-changes, build-and-test]
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Skipped (no code changes)
        if: needs.detect-changes.outputs.code != 'true'
        run: echo "No code changes; integration tests skipped."

      # All remaining steps gated on code changes
      - uses: actions/checkout@v7
        if: needs.detect-changes.outputs.code == 'true'

      - uses: actions/setup-node@v7
        if: needs.detect-changes.outputs.code == 'true'
        with:
          node-version: "22.x"
          cache: npm

      - name: Install dependencies
        if: needs.detect-changes.outputs.code == 'true'
        run: npm ci

      - name: Build
        if: needs.detect-changes.outputs.code == 'true'
        run: npm run build

      - name: Install LangGraph CLI
        if: needs.detect-changes.outputs.code == 'true'
        run: pip install --quiet "langgraph-cli[inmem]"

      - name: Start langgraph dev
        if: needs.detect-changes.outputs.code == 'true'
        # Combined langgraph.json registers integration-stub, hitl-stub, and
        # multi-node-stub from one server. Fail loudly if startup breaks.
        run: |
          cd examples/integration-test-graph && langgraph dev --no-browser &
          LG_PID=$!
          echo "Waiting for LangGraph server to become ready (PID $LG_PID)…"
          ready=""
          for i in $(seq 1 60); do
            if curl -sf http://localhost:2024/info >/dev/null; then
              ready="y"
              break
            fi
            if ! kill -0 "$LG_PID" 2>/dev/null; then
              echo "ERROR: langgraph dev exited before becoming ready." >&2
              wait "$LG_PID" 2>/dev/null || true
              exit 1
            fi
            sleep 1
          done
          if [ -z "$ready" ]; then
            echo "ERROR: LangGraph server not ready after 60s. Killing PID $LG_PID." >&2
            kill "$LG_PID" 2>/dev/null || true
            exit 1
          fi
          echo "LangGraph server ready."

      - name: Run integration tests
        if: needs.detect-changes.outputs.code == 'true'
        run: npm run test:integration -- --reporter=json --outputFile=integration-results.json
        env:
          LANGGRAPH_BASE_URL: "http://localhost:2024"
          LANGGRAPH_HITL_WORKFLOW: hitl-stub
          LANGGRAPH_MULTI_NODE_WORKFLOW: multi-node-stub

      - name: Assert integration tests ran
        if: needs.detect-changes.outputs.code == 'true'
        run: |
          jq -e '.numTotalTests > 0 and .numPassedTests > 0' integration-results.json \
            || { echo "ERROR: No integration tests ran or passed."; exit 1; }
