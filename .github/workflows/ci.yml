name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test (Node ${{ matrix.node-version }} on ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        node-version: ["22.x", "24.x"]
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check & build
        run: npm run build

      - name: Run tests
        run: npm test

  integration:
    name: Integration Tests (LangGraph dev)
    runs-on: ubuntu-latest
    needs: build-and-test
    # Non-blocking: integration job failures do not prevent PR merges.
    # Tighten this once the suite stabilises.
    continue-on-error: true
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install LangGraph CLI
        run: pip install --quiet langgraph-cli

      - name: Start langgraph dev
        run: |
          langgraph dev --no-browser &
          echo "Waiting for LangGraph server to become ready…"
          for i in $(seq 1 30); do
            curl -sf http://localhost:2024/info && break
            sleep 1
          done
        continue-on-error: true # skip integration if dev server can't start

      - name: Run integration tests
        run: npm run test:integration
        env:
          LANGGRAPH_BASE_URL: "http://localhost:2024"
