name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test (Node ${{ matrix.node-version }} on ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        node-version: ["22.x", "24.x"]
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check & build
        run: npm run build

      - name: Run tests
        run: npm test

  integration:
    name: Integration Tests (LangGraph dev)
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install LangGraph CLI
        run: pip install --quiet langgraph-cli

      - name: Start langgraph dev
        # Start the example stub graph so that integration tests can reach
        # a real assistant ('integration-stub').  If this step fails (e.g.
        # broken graph, missing deps), we want a loud failure — not a silent
        # skip.  continue-on-error is intentionally absent.
        run: |
          cd examples/integration-test-graph && langgraph dev --no-browser &
          echo "Waiting for LangGraph server to become ready…"
          for i in $(seq 1 30); do
            curl -sf http://localhost:2024/info && break
            sleep 1
          done
          echo "LangGraph server ready."

      - name: Run integration tests
        run: npm run test:integration -- --reporter=json --outputFile=integration-results.json
        env:
          LANGGRAPH_BASE_URL: "http://localhost:2024"
          # LANGGRAPH_WORKFLOW defaults to "integration-stub" (matches examples/integration-test-graph)

      # Guard: assert that at least one test actually ran and passed.
      # Without this guard vitest exits 0 when every describe block is
      # skipped (e.g. isLangGraphReachable() returned false), producing a
      # false-green check on the PR.
      - name: Assert integration tests ran
        run: |
          jq -e '.numTotalTests > 0 and .numPassedTests > 0' integration-results.json \
            || { echo "ERROR: No integration tests ran or passed. Check the LangGraph server startup step above."; exit 1; }
